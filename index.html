<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b1f3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ご筋トレ 〜昇進への道〜</title>
<style>
  :root{
    --navy:#0b1f3a; --navy2:#13294b; --gold:#d4af37; --gold2:#f3d989;
    --ok:#2ecc71; --ng:#5b6b82; --ink:#0b1f3a; --paper:#ffffff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
    color:#eaf1ff; min-height:100vh;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1f3c6e 0%, transparent 60%),
      linear-gradient(180deg,#0b1f3a 0%, #08152b 100%);
    overflow-x:hidden;
  }
  /* 背景：頑張る警察官のシーン */
  .scene{
    position:fixed; inset:0; z-index:0; opacity:.14; pointer-events:none;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .scene svg{width:min(900px,96vw); height:auto;}
  .wrap{position:relative; z-index:1; max-width:760px; margin:0 auto; padding:20px 14px 60px;}

  header{text-align:center; margin-bottom:16px;}
  .title{font-size:30px; font-weight:800; letter-spacing:2px;
    background:linear-gradient(90deg,var(--gold2),var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;}
  .subtitle{font-size:13px; color:#9fb4d8; margin-top:4px;}

  .card{
    background:rgba(255,255,255,.06); border:1px solid rgba(212,175,55,.35);
    border-radius:16px; padding:18px; margin-bottom:16px; backdrop-filter:blur(4px);
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }

  /* 階級表示 */
  .rank-card{text-align:center;}
  /* 動く腕立て警察官 */
  .trainer{width:100%; height:90px; margin-bottom:6px;}
  .trainer .officer{transform-box:fill-box; transform-origin:center bottom;
    animation:pushup 1.4s ease-in-out infinite;}
  @keyframes pushup{0%,100%{transform:translateY(0);}50%{transform:translateY(11px);}}
  .trainer .sweat{animation:sweat 1.4s ease-in-out infinite;}
  @keyframes sweat{0%,55%{opacity:0;}65%{opacity:1;}100%{opacity:0; transform:translateY(10px);}}

  .badge{
    width:90px; height:90px; margin:0 auto 8px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold2), var(--gold) 60%, #9a7d1e);
    display:flex; align-items:center; justify-content:center; font-size:44px;
    box-shadow:0 0 0 6px rgba(212,175,55,.18), 0 8px 20px rgba(0,0,0,.4);
  }
  .rank-name{font-size:26px; font-weight:800; color:var(--gold2);}
  .rank-lv{font-size:13px; color:#9fb4d8;}
  .pts{font-size:14px; margin-top:6px; color:#d7e3ff;}
  .pts b{color:#fff; font-size:18px;}

  .bar{height:14px; border-radius:8px; background:rgba(255,255,255,.12); overflow:hidden; margin-top:12px;}
  .bar>span{display:block; height:100%; width:0;
    background:linear-gradient(90deg,var(--gold),var(--gold2)); transition:width .6s ease;}
  .next{font-size:12px; color:#9fb4d8; margin-top:6px;}

  .stats{display:flex; gap:10px; margin-top:14px;}
  .stat{flex:1; text-align:center; background:rgba(255,255,255,.05);
    border-radius:12px; padding:10px 4px;}
  .stat .v{font-size:22px; font-weight:800; color:#fff;}
  .stat .l{font-size:11px; color:#9fb4d8;}

  /* 入力 */
  .editing-note{font-size:12px; color:var(--gold2); text-align:center; margin:-4px 0 10px; min-height:16px;}
  .row{display:flex; align-items:center; justify-content:space-between; margin:14px 0; gap:10px;}
  .row label{font-size:16px; font-weight:600;}
  .row small{display:block; font-size:11px; color:#9fb4d8; font-weight:400;}
  input[type=date]{background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
    color:#fff; border-radius:10px; padding:8px 10px; font-size:15px;}
  input[type=number]{width:120px; background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:10px;
    padding:10px; font-size:18px; text-align:center;}

  /* トグルスイッチ（labelで囲ってタップで確実に切替） */
  .toggle{position:relative; display:inline-block; width:88px; height:42px; flex:0 0 auto; cursor:pointer;}
  .toggle input{position:absolute; opacity:0; width:0; height:0;}
  .toggle .track{position:absolute; inset:0; border-radius:21px; background:var(--ng); transition:.25s;}
  .toggle .knob{position:absolute; top:3px; left:3px; width:36px; height:36px;
    border-radius:50%; background:#fff; transition:.25s; box-shadow:0 2px 6px rgba(0,0,0,.4);}
  .toggle .txt{position:absolute; top:0; height:42px; display:flex; align-items:center;
    font-size:12px; font-weight:700; color:#fff; transition:.2s;}
  .toggle .txt.on{left:13px; opacity:0;}
  .toggle .txt.off{right:11px; opacity:1; color:#cdd8ec;}
  .toggle input:checked ~ .track{background:var(--ok);}
  .toggle input:checked ~ .track .knob{left:49px;}
  .toggle input:checked ~ .track .txt.on{opacity:1;}
  .toggle input:checked ~ .track .txt.off{opacity:0;}

  .quick{display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;}
  .quick button{background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2);
    color:#dfe8fb; border-radius:8px; padding:8px 12px; font-size:14px; cursor:pointer;}
  .quick button:active{background:rgba(212,175,55,.3);}

  .btn{display:block; width:100%; margin-top:18px; padding:16px; border:none; cursor:pointer;
    border-radius:12px; font-size:18px; font-weight:800; letter-spacing:2px; color:#0b1f3a;
    background:linear-gradient(90deg,var(--gold),var(--gold2));
    box-shadow:0 6px 18px rgba(212,175,55,.4); transition:transform .1s;}
  .btn:active{transform:scale(.98);}

  .msg{text-align:center; margin-top:12px; min-height:22px; font-size:15px; font-weight:700; color:var(--gold2);}

  /* 履歴 */
  h3{font-size:15px; color:var(--gold2); margin:0 0 6px; letter-spacing:1px;}
  .hint{font-size:11px; color:#8499bd; margin:0 0 12px;}
  .hist{display:flex; flex-direction:column; gap:6px; max-height:300px; overflow-y:auto;}
  .hitem{display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:rgba(255,255,255,.04); border-radius:8px; padding:10px 12px; font-size:14px; cursor:pointer;}
  .hitem:active{background:rgba(212,175,55,.16);}
  .hitem .d{color:#cdd8ec; font-variant-numeric:tabular-nums; flex:0 0 auto;}
  .hitem .tags{display:flex; gap:6px; flex:1; flex-wrap:wrap; justify-content:flex-end;}
  .tag{font-size:11px; padding:3px 8px; border-radius:6px; font-weight:700; white-space:nowrap;}
  .tag.alc{background:#1f6b3a;} .tag.abst{background:#1f4f6b;} .tag.gym{background:#6b4f1f;}
  .hitem .p{font-weight:800; color:var(--gold2); flex:0 0 auto;}
  .hitem .del{background:none; border:none; color:#7a8aa8; font-size:16px; cursor:pointer; padding:0 2px; flex:0 0 auto;}
  .hitem .del:active{color:#ff7a7a;}
  .empty{color:#8499bd; font-size:14px; text-align:center; padding:14px;}

  .footer{text-align:center; margin-top:14px;}
  .footer button{background:none; border:1px solid rgba(255,255,255,.2); color:#8499bd;
    border-radius:8px; padding:8px 14px; font-size:12px; cursor:pointer; margin:0 4px;}

  /* ロードマップ */
  .road{display:flex; flex-direction:column; gap:4px;}
  .rstep{display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:8px; font-size:13px;}
  .rstep.done{background:rgba(46,204,113,.12);}
  .rstep.cur{background:rgba(212,175,55,.18); border:1px solid rgba(212,175,55,.5);}
  .rstep .ri{width:26px; height:26px; border-radius:50%; flex:0 0 auto; display:flex;
    align-items:center; justify-content:center; font-size:12px; font-weight:800; background:rgba(255,255,255,.1);}
  .rstep.done .ri{background:var(--ok);}
  .rstep.cur .ri{background:var(--gold);}
  .rstep .rn{flex:1; font-weight:700;}
  .rstep .rp{color:#9fb4d8; font-variant-numeric:tabular-nums;}

  @keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.22);}100%{transform:scale(1);}}
  .pop{animation:pop .5s ease;}

  /* 紙吹雪 */
  .confetti{position:fixed; top:-12px; width:10px; height:14px; z-index:99; pointer-events:none;
    animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg); opacity:.9;}}

  @media(max-width:480px){
    .title{font-size:26px;} .row label{font-size:15px;}
  }
</style>
</head>
<body>

<!-- 背景の警察官＆バッジ -->
<div class="scene">
<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="232" width="400" height="28" fill="#dfe8fb"/>
  <g transform="translate(312,70)" fill="#f3d989" opacity=".85">
    <polygon points="0,-46 12,-14 46,-14 18,8 28,42 0,22 -28,42 -18,8 -46,-14 -12,-14"/>
    <circle cx="0" cy="-2" r="14" fill="#0b1f3a"/>
    <text x="0" y="3" font-size="13" fill="#f3d989" text-anchor="middle" font-weight="bold">警</text>
  </g>
  <g stroke="#f3d989" stroke-width="7" stroke-linecap="round" fill="none">
    <line x1="120" y1="200" x2="232" y2="176"/>
    <circle cx="247" cy="170" r="14" fill="#f3d989" stroke="none"/>
    <path d="M234 164 q13 -12 26 0" stroke-width="6"/>
    <line x1="227" y1="178" x2="227" y2="226"/>
    <line x1="120" y1="200" x2="93" y2="226"/>
    <line x1="125" y1="202" x2="106" y2="227"/>
  </g>
</svg>
</div>

<div class="wrap">
  <header>
    <div class="title">ご筋トレ</div>
    <div class="subtitle">〜 巡査から警察庁長官まで、昇進への道 〜</div>
  </header>

  <!-- 現在の階級 -->
  <div class="card rank-card">
    <!-- 動く腕立て警察官 -->
    <svg class="trainer" viewBox="0 0 240 90" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="78" width="200" height="6" rx="3" fill="rgba(212,175,55,.5)"/>
      <g class="officer" stroke="#f3d989" stroke-width="6" stroke-linecap="round" fill="none">
        <line x1="70" y1="56" x2="150" y2="42"/>
        <circle cx="163" cy="38" r="11" fill="#f3d989" stroke="none"/>
        <path d="M152 33 q11 -10 22 0" stroke-width="5"/>
        <circle cx="167" cy="36" r="2.5" fill="#0b1f3a" stroke="none"/>
        <line x1="146" y1="44" x2="146" y2="76"/>
        <line x1="70" y1="56" x2="48" y2="76"/>
        <line x1="74" y1="57" x2="58" y2="76"/>
        <g class="sweat" fill="#bcdcff" stroke="none"><circle cx="178" cy="34" r="3"/></g>
      </g>
    </svg>

    <div class="badge" id="badge">👮</div>
    <div class="rank-name" id="rankName">巡査</div>
    <div class="rank-lv" id="rankLv">Lv.1</div>
    <div class="pts">累計 <b id="totalPts">0</b> pt</div>
    <div class="bar"><span id="bar"></span></div>
    <div class="next" id="nextInfo"></div>
    <div class="stats">
      <div class="stat"><div class="v" id="streak">0</div><div class="l">連続記録日</div></div>
      <div class="stat"><div class="v" id="days">0</div><div class="l">記録した日数</div></div>
      <div class="stat"><div class="v" id="gymTotal">0</div><div class="l">筋トレ合計(分)</div></div>
    </div>
  </div>

  <!-- 入力 -->
  <div class="card">
    <div class="editing-note" id="editNote"></div>
    <div class="row">
      <label>記録する日</label>
      <input type="date" id="date">
    </div>
    <div class="row">
      <label>🍺 禁酒<small>お酒を飲まなかった</small></label>
      <label class="toggle"><input type="checkbox" id="alc"><div class="track"><span class="txt on">達成</span><span class="txt off">未</span><span class="knob"></span></div></label>
    </div>
    <div class="row">
      <label>🧘 禁欲<small>自分に勝った</small></label>
      <label class="toggle"><input type="checkbox" id="abst"><div class="track"><span class="txt on">達成</span><span class="txt off">未</span><span class="knob"></span></div></label>
    </div>
    <div class="row">
      <label>💪 筋トレ<small>今日やった時間（分）</small></label>
      <input type="number" id="gym" min="0" max="600" value="0" inputmode="numeric">
    </div>
    <div class="quick">
      <button data-min="10">+10分</button>
      <button data-min="20">+20分</button>
      <button data-min="30">+30分</button>
      <button data-min="60">+60分</button>
      <button data-min="0" id="clearMin">0に戻す</button>
    </div>
    <button class="btn" id="save">この日を記録する</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- 昇進ロードマップ -->
  <div class="card">
    <h3>昇進ロードマップ</h3>
    <div class="road" id="road"></div>
  </div>

  <!-- 履歴 -->
  <div class="card">
    <h3>記録の履歴</h3>
    <p class="hint">行をタップすると、その日の記録を読み込んで修正できます（後からの直しもOK）。</p>
    <div class="hist" id="hist"></div>
    <div class="footer">
      <button id="export">バックアップ書き出し</button>
      <button id="reset">全データ削除</button>
    </div>
  </div>
</div>

<script>
const RANKS = [
  {name:'巡査',        emoji:'👮', min:0},
  {name:'巡査長',      emoji:'👮', min:150},
  {name:'巡査部長',    emoji:'🎖️', min:400},
  {name:'警部補',      emoji:'🎖️', min:750},
  {name:'警部',        emoji:'🏅', min:1200},
  {name:'警視',        emoji:'🏅', min:1750},
  {name:'警視正',      emoji:'⭐', min:2400},
  {name:'警視長',      emoji:'⭐', min:3200},
  {name:'警視監',      emoji:'🌟', min:4100},
  {name:'警視総監',    emoji:'👑', min:5000},
  {name:'警察庁長官',  emoji:'👑', min:6000},
];

const P_ALC = 15, P_ABST = 15, GYM_CAP = 120, STREAK_CAP = 20;
function streakBonus(s){ return Math.min(s, STREAK_CAP) * 2; }

const KEY = 'gokintore_v1';
let data = load();

function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; } }
function store(){ localStorage.setItem(KEY, JSON.stringify(data)); }

function todayStr(){ return fmt(new Date()); }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function diffDays(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

function dayBase(r){
  let p=0;
  if(r.alc) p+=P_ALC;
  if(r.abst) p+=P_ABST;
  p += Math.min(r.gym||0, GYM_CAP);
  return p;
}
function isActive(r){ return r && (r.alc || r.abst || (r.gym||0)>0); }

function compute(){
  const dates = Object.keys(data).sort();
  let total=0, streak=0, prev=null, gymTotal=0, days=0;
  const perDay={};
  for(const d of dates){
    const r=data[d];
    if(!isActive(r)){ perDay[d]=0; continue; }
    days++; gymTotal += (r.gym||0);
    if(prev && diffDays(prev,d)===1) streak++; else streak=1;
    const pts = dayBase(r) + streakBonus(streak);
    perDay[d]=pts; total+=pts; prev=d;
  }
  let curStreak=0;
  if(prev && diffDays(prev, todayStr())<=1) curStreak = streak;
  return {total, curStreak, gymTotal, days, perDay};
}

function rankFor(total){
  let idx=0;
  for(let i=0;i<RANKS.length;i++){ if(total>=RANKS[i].min) idx=i; }
  return idx;
}

function render(){
  const c = compute();
  const idx = rankFor(c.total);
  const rank = RANKS[idx], next = RANKS[idx+1];

  document.getElementById('badge').textContent = rank.emoji;
  document.getElementById('rankName').textContent = rank.name;
  document.getElementById('rankLv').textContent = 'Lv.'+(idx+1);
  document.getElementById('totalPts').textContent = c.total.toLocaleString();
  document.getElementById('streak').textContent = c.curStreak;
  document.getElementById('days').textContent = c.days;
  document.getElementById('gymTotal').textContent = c.gymTotal.toLocaleString();

  const bar = document.getElementById('bar');
  if(next){
    const prog = Math.min(100, Math.round((c.total - rank.min)/(next.min - rank.min)*100));
    bar.style.width = prog+'%';
    document.getElementById('nextInfo').textContent =
      '次は「'+next.name+'」まで あと '+(next.min - c.total).toLocaleString()+' pt';
  }else{
    bar.style.width='100%';
    document.getElementById('nextInfo').textContent = '🎉 最高位！警察庁長官に到達しました！';
  }

  const road = document.getElementById('road');
  road.innerHTML='';
  RANKS.forEach((r,i)=>{
    const div=document.createElement('div');
    div.className='rstep'+(i<idx?' done':'')+(i===idx?' cur':'');
    div.innerHTML='<div class="ri">'+(i<idx?'✓':(i+1))+'</div><div class="rn">'+r.name+'</div><div class="rp">'+r.min.toLocaleString()+' pt</div>';
    road.appendChild(div);
  });

  const hist = document.getElementById('hist');
  hist.innerHTML='';
  const dates = Object.keys(data).sort().reverse();
  if(dates.length===0){ hist.innerHTML='<div class="empty">まだ記録がありません。今日から始めましょう！</div>'; }
  dates.forEach(d=>{
    const r=data[d];
    const item=document.createElement('div');
    item.className='hitem';
    let tags='';
    if(r.alc) tags+='<span class="tag alc">禁酒</span>';
    if(r.abst) tags+='<span class="tag abst">禁欲</span>';
    if((r.gym||0)>0) tags+='<span class="tag gym">💪'+r.gym+'分</span>';
    if(!tags) tags='<span class="tag" style="background:#3a4a63">記録なし</span>';
    item.innerHTML='<span class="d">'+d.slice(5).replace('-','/')+'</span><span class="tags">'+tags+'</span><span class="p">'+(c.perDay[d]||0)+'pt</span><button class="del" title="この日を削除">🗑</button>';
    item.addEventListener('click', ()=>{ document.getElementById('date').value=d; fillForm(d); window.scrollTo({top:0,behavior:'smooth'}); });
    item.querySelector('.del').addEventListener('click', (e)=>{
      e.stopPropagation();
      if(confirm(d+' の記録を削除しますか？')){ delete data[d]; store(); render(); }
    });
    hist.appendChild(item);
  });

  return {c, idx};
}

function fillForm(d){
  const r = data[d] || {};
  document.getElementById('alc').checked = !!r.alc;
  document.getElementById('abst').checked = !!r.abst;
  document.getElementById('gym').value = r.gym||0;
  const note = document.getElementById('editNote');
  note.textContent = data[d] ? '✏️ '+d.replace(/-/g,'/')+' の記録を修正中（上書き保存できます）' : '';
}

function celebrate(){
  const colors=['#d4af37','#f3d989','#2ecc71','#ffffff','#7ab8ff'];
  for(let i=0;i<90;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=(Math.random()*100)+'vw';
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(1.8+Math.random()*1.6)+'s';
    c.style.animationDelay=(Math.random()*0.4)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 3800);
  }
}

// 初期化
document.getElementById('date').value = todayStr();
fillForm(todayStr());
let prevRankIdx = render().idx;

document.getElementById('date').addEventListener('change', e=> fillForm(e.target.value));

document.querySelectorAll('.quick button[data-min]').forEach(b=>{
  b.addEventListener('click',()=>{
    const g=document.getElementById('gym');
    g.value = (b.id==='clearMin') ? 0 : (parseInt(g.value||0) + parseInt(b.dataset.min));
  });
});

document.getElementById('save').addEventListener('click', ()=>{
  const d = document.getElementById('date').value;
  if(!d) return;
  data[d] = {
    alc: document.getElementById('alc').checked,
    abst: document.getElementById('abst').checked,
    gym: Math.max(0, parseInt(document.getElementById('gym').value||0))
  };
  store();
  const res = render();
  fillForm(d);
  const badge=document.getElementById('badge');
  badge.classList.remove('pop'); void badge.offsetWidth; badge.classList.add('pop');

  const msg=document.getElementById('msg');
  if(res.idx > prevRankIdx){
    msg.textContent = '🎉 昇進！「'+RANKS[res.idx].name+'」になりました！';
    celebrate();
  }else{
    const lines=['記録しました。その調子！','よく頑張りました！','一歩前進です 👮','継続は力なり！','立派です、署長も見ています。'];
    msg.textContent = lines[res.c.days % lines.length];
  }
  prevRankIdx = res.idx;
  setTimeout(()=>{ msg.textContent=''; }, 4000);
});

document.getElementById('reset').addEventListener('click', ()=>{
  if(confirm('本当に全データを削除しますか？この操作は元に戻せません。')){
    data={}; store(); render();
    document.getElementById('date').value=todayStr(); fillForm(todayStr());
  }
});

document.getElementById('export').addEventListener('click', ()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='gokintore_backup_'+todayStr()+'.json';
  a.click();
});
</script>
</body>
</html>
